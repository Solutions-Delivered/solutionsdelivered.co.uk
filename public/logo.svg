<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 50" width="200" height="50" role="img" aria-label="Solutions Delivered Logo">
  <title>Solutions Delivered</title>

  <defs>
    <!-- Gradient for the circle -->
    <radialGradient id="circleGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#198fd9;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#1a7fc7;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#0f6ba8;stop-opacity:0.5" />
    </radialGradient>
  </defs>

  <!-- Outer circle with gradient -->
  <circle cx="25" cy="25" r="22" fill="url(#circleGradient)"/>

  <!-- Halftone dots for texture -->
  <g opacity="0.25">
    <!-- Outer ring dots -->
    <circle cx="14" cy="14" r="1.2" fill="#0f6ba8"/>
    <circle cx="36" cy="14" r="1.2" fill="#0f6ba8"/>
    <circle cx="14" cy="36" r="1.2" fill="#0f6ba8"/>
    <circle cx="36" cy="36" r="1.2" fill="#0f6ba8"/>
    <circle cx="25" cy="8" r="1.4" fill="#0f6ba8"/>
    <circle cx="25" cy="42" r="1.4" fill="#0f6ba8"/>
    <circle cx="8" cy="25" r="1.4" fill="#0f6ba8"/>
    <circle cx="42" cy="25" r="1.4" fill="#0f6ba8"/>

    <!-- Middle ring dots -->
    <circle cx="17" cy="17" r="0.9" fill="#1a7fc7"/>
    <circle cx="33" cy="17" r="0.9" fill="#1a7fc7"/>
    <circle cx="17" cy="33" r="0.9" fill="#1a7fc7"/>
    <circle cx="33" cy="33" r="0.9" fill="#1a7fc7"/>
    <circle cx="25" cy="12" r="1" fill="#1a7fc7"/>
    <circle cx="25" cy="38" r="1" fill="#1a7fc7"/>
    <circle cx="12" cy="25" r="1" fill="#1a7fc7"/>
    <circle cx="38" cy="25" r="1" fill="#1a7fc7"/>

    <!-- Inner accent dots -->
    <circle cx="20" cy="20" r="0.7" fill="#198fd9"/>
    <circle cx="30" cy="20" r="0.7" fill="#198fd9"/>
    <circle cx="20" cy="30" r="0.7" fill="#198fd9"/>
    <circle cx="30" cy="30" r="0.7" fill="#198fd9"/>
  </g>

  <!-- White circle knockout for letters -->
  <circle cx="25" cy="25" r="14" fill="white" opacity="0.98"/>

  <!-- S and D letters with overlapping effect -->
  <g font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="28">
    <!-- White outline for knockout effect -->
    <text x="25" y="35" text-anchor="middle" fill="none" stroke="white" stroke-width="4" letter-spacing="-3">SD</text>

    <!-- Letter S in dark blue -->
    <text x="17" y="35" text-anchor="middle" fill="#0f6ba8">S</text>

    <!-- Letter D in primary blue overlapping S -->
    <text x="30" y="35" text-anchor="middle" fill="#198fd9">D</text>
  </g>

  <!-- Company name text -->
  <g font-family="Arial, Helvetica, sans-serif" font-weight="700">
    <text x="60" y="22" font-size="10" fill="#4a5568" letter-spacing="0.8">SOLUTIONS</text>
    <text x="60" y="35" font-size="10" fill="#4a5568" letter-spacing="0.8">DELIVERED</text>
  </g>
</svg>
