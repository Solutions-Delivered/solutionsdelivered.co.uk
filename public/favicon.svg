<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 50" width="50" height="50" role="img" aria-label="Solutions Delivered Icon">
  <title>SD</title>

  <defs>
    <!-- Gradient for the circle -->
    <radialGradient id="iconGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#198fd9;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#1a7fc7;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#0f6ba8;stop-opacity:0.5" />
    </radialGradient>
  </defs>

  <!-- Outer circle with gradient -->
  <circle cx="25" cy="25" r="24" fill="url(#iconGradient)"/>

  <!-- Halftone dots for texture -->
  <g opacity="0.25">
    <!-- Outer ring dots -->
    <circle cx="12" cy="12" r="1.5" fill="#0f6ba8"/>
    <circle cx="38" cy="12" r="1.5" fill="#0f6ba8"/>
    <circle cx="12" cy="38" r="1.5" fill="#0f6ba8"/>
    <circle cx="38" cy="38" r="1.5" fill="#0f6ba8"/>
    <circle cx="25" cy="5" r="1.8" fill="#0f6ba8"/>
    <circle cx="25" cy="45" r="1.8" fill="#0f6ba8"/>
    <circle cx="5" cy="25" r="1.8" fill="#0f6ba8"/>
    <circle cx="45" cy="25" r="1.8" fill="#0f6ba8"/>

    <!-- Middle ring dots -->
    <circle cx="16" cy="16" r="1.2" fill="#1a7fc7"/>
    <circle cx="34" cy="16" r="1.2" fill="#1a7fc7"/>
    <circle cx="16" cy="34" r="1.2" fill="#1a7fc7"/>
    <circle cx="34" cy="34" r="1.2" fill="#1a7fc7"/>
    <circle cx="25" cy="10" r="1.3" fill="#1a7fc7"/>
    <circle cx="25" cy="40" r="1.3" fill="#1a7fc7"/>
    <circle cx="10" cy="25" r="1.3" fill="#1a7fc7"/>
    <circle cx="40" cy="25" r="1.3" fill="#1a7fc7"/>

    <!-- Inner accent dots -->
    <circle cx="19" cy="19" r="0.9" fill="#198fd9"/>
    <circle cx="31" cy="19" r="0.9" fill="#198fd9"/>
    <circle cx="19" cy="31" r="0.9" fill="#198fd9"/>
    <circle cx="31" cy="31" r="0.9" fill="#198fd9"/>
  </g>

  <!-- White circle knockout for letters -->
  <circle cx="25" cy="25" r="15" fill="white" opacity="0.98"/>

  <!-- S and D letters with overlapping effect -->
  <g font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="30">
    <!-- White outline for knockout effect -->
    <text x="25" y="36" text-anchor="middle" fill="none" stroke="white" stroke-width="4.5" letter-spacing="-3">SD</text>

    <!-- Letter S in dark blue -->
    <text x="18" y="36" text-anchor="middle" fill="#0f6ba8">S</text>

    <!-- Letter D in primary blue overlapping S -->
    <text x="31" y="36" text-anchor="middle" fill="#198fd9">D</text>
  </g>
</svg>
